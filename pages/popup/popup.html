<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Subtitle AI Helper</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <header>
        <p class="eyebrow">Subtitle AI Helper</p>
        <h1>英语学习</h1>
      </header>

      <section class="stats" aria-label="学习统计">
        <article>
          <span id="today-count">0</span>
          <p>今日学习</p>
        </article>
        <article>
          <span id="due-count">0</span>
          <p>今日复习</p>
        </article>
      </section>

      <section class="actions">
        <button id="open-list" type="button">学习清单</button>
        <button id="open-review" type="button">今日复习</button>
        <button id="enable-helper" class="secondary" type="button">在当前页显示助手</button>
      </section>

      <p id="status" class="status" role="status"></p>
    </main>

    <script src="../../shared/review-scheduler.js"></script>
    <script src="../../shared/learning-storage.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
